<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flashcards Pro - V51.9.7 (Sync Mode)</title>
    <style>
        :root { --blue: #007bff; --purple: #6f42c1; --dark-blue: #2c3e50; --bg: #f4f7f9; --text-dark: #2d3436; --deep-blue: #0984e3; --light-gray: #f1f2f6; --red: #e74c3c; --green: #27ae60; --orange: #f39c12; --teal: #00cec9; --grey: #636e72; --pink: #d63031; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; padding-bottom: 80px; color: var(--text-dark); overflow-x: hidden; width: 100vw; }
        button, .nav-btn, .list-btn { transition: transform 0.1s ease, opacity 0.1s ease; outline: none; cursor: pointer; border: none; }
        button:active, .nav-btn:active, .list-btn:active { transform: scale(0.92); opacity: 0.7; }
        .main-nav { background: #2c3e50; width: 100%; display: flex; justify-content: center; padding: 12px 0; gap: 15px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.2); flex-wrap: wrap; }
        .nav-btn { padding: 10px 20px; border-radius: 6px; font-weight: bold; color: white; background: #455a64; font-size: 14px; }
        .nav-btn.active-a { background: var(--blue); }
        .nav-btn.active-d { background: var(--pink); }
        .nav-btn.active-b { background: var(--purple); }
        .nav-btn.active-c { background: var(--dark-blue); border: 1px solid white; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 0 10px; }
        .card-mode-selector { padding: 5px 10px; border-radius: 8px; border: 1px solid #ddd; background: #f8f9fa; font-size: 13px; font-weight: bold; color: var(--text-dark); outline: none; }
        .card { background: white; width: 100%; max-width: 1000px; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; margin-bottom: 25px; border-top: 8px solid #ddd; box-sizing: border-box; }
        #sectionA .card { border-color: var(--blue); }
        #sectionD .card { border-color: var(--pink); }
        #sectionB .card { border-color: var(--purple); }
        #sectionC .card { border-color: var(--dark-blue); }
        .word-display { font-size: 34px; font-weight: 800; margin: 25px auto; display: flex; align-items: center; justify-content: flex-start; gap: 15px; min-height: 60px; color: #1a1a1a; word-break: break-word; width: 85%; max-width: 850px; text-align: left; }
        .input-group { display: flex; width: 85%; max-width: 850px; margin: 0 auto 10px auto; gap: 10px; }
        .game-input { flex: 1; padding: 18px; border: 2px solid #b2bec3; border-radius: 10px; font-size: 22px; text-align: center; outline: none; box-sizing: border-box; }
        .btn-check { width: 180px; padding: 0 15px; border-radius: 10px; font-weight: bold; color: white; background: #2d3436; font-size: 16px; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .feedback-area { margin: 0 auto 20px auto; width: 85%; max-width: 850px; font-weight: 900; font-size: 26px; min-height: 45px; color: var(--deep-blue); line-height: 1.4; white-space: pre-line; text-align: left; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 3000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 800px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .modal-content h3 { margin-top: 0; color: var(--dark-blue); }
        .modal-field { margin-bottom: 15px; }
        .modal-field label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        .modal-field textarea { width: 100%; padding: 12px; border: 2px solid #dfe6e9; border-radius: 8px; font-size: 18px; font-family: inherit; resize: vertical; min-height: 80px; box-sizing: border-box; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px; }
        .btn-modal { padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-save { background: var(--green); color: white; }
        .btn-cancel { background: var(--grey); color: white; }
        .btn-restart { background: #27ae60; color: white; padding: 15px 30px; border-radius: 10px; font-size: 20px; font-weight: bold; margin-top: 20px; display: none; }
        .game-controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 85%; max-width: 850px; margin: 0 auto; }
        .btn-act { padding: 14px; border-radius: 8px; color: white; font-weight: bold; font-size: 14px; text-transform: uppercase; }
        .btn-edit { background: #636e72; }
        .btn-postpone { background: var(--orange); }
        .btn-delete { background: var(--red); }
        .db-section { display: none; width: 100%; flex-direction: column; align-items: center; padding: 20px 0; }
        .db-section.active { display: flex; }
        .add-container { width: 100%; max-width: 1200px; background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; gap: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #eee; box-sizing: border-box;}
        .add-input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        .btn-add { background: var(--green); color: white; padding: 10px 20px; border-radius: 6px; font-weight: bold; font-size: 14px; }
        .search-container { width: 100%; max-width: 1200px; margin-bottom: 15px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; box-sizing: border-box; padding: 0 5px; }
        .search-input { width: 250px; flex-grow: 1; padding: 12px 15px; border-radius: 10px; border: 1px solid #dfe6e9; font-size: 16px; outline: none; box-sizing: border-box; }
        .btn-tool { padding: 10px 15px; border-radius: 8px; color: white; font-weight: bold; font-size: 12px; text-transform: uppercase; }
        .admin-panel { background: white; width: 100%; max-width: 1200px; border-radius: 15px; border: 1px solid #dfe6e9; margin-bottom: 30px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); box-sizing: border-box; }
        .list-header { padding: 18px 25px; background: #f8f9fa; border-bottom: 2px solid #eee; font-weight: bold; }
        .scroll-area { max-height: 1000px; overflow-y: auto; overflow-x: auto; position: relative; -webkit-overflow-scrolling: touch; }
        table { width: 100%; min-width: 1000px; border-collapse: collapse; table-layout: fixed; }
        th { background: #2d3436; padding: 15px 5px; font-size: 11px; color: white; text-transform: uppercase; text-align: center; position: sticky; top: 0; z-index: 10; }
        td { padding: 12px 4px; border-bottom: 1px solid #eee; text-align: center; font-size: 14px; vertical-align: middle; }
        .col-idx { width: 40px; }
        .col-main { width: 230px; text-align: left !important; padding-left: 20px !important; font-weight: 700; word-break: break-word; }
        .col-trans { width: 400px; text-align: left !important; }
        .list-active-highlight { background-color: #e3f2fd; padding: 4px 8px; border-radius: 6px; display: inline-block; }
        .list-btn { padding: 8px 12px; border-radius: 6px; font-weight: bold; color: white; min-width: 40px; }
        .btn-edit-list { background: var(--grey); }
        .btn-postpone-list { background: var(--orange); }
        .btn-reactivate-list { background: var(--green); }
        .btn-trash-list { background: var(--red); box-shadow: 0 2px 4px rgba(231, 76, 60, 0.3); }
        .hidden-text { background: var(--light-gray); color: var(--deep-blue); padding: 8px 12px; border-radius: 6px; cursor: pointer; display: block; width: 95%; border: 1px solid #dcdde1; box-sizing: border-box; filter: blur(4px); white-space: pre-wrap; word-break: break-word; transition: filter 0.2s; }
        #tableC .hidden-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        tr:hover .hidden-text { filter: blur(0); background: var(--deep-blue); color: white !important; font-weight: bold; }
        .backup-footer { width: 100%; max-width: 1200px; display: flex; justify-content: center; gap: 20px; margin-top: 20px; padding: 20px; border-top: 2px dashed #ccc; box-sizing: border-box; }
        .btn-backup { padding: 15px 25px; border-radius: 10px; color: white; font-weight: bold; font-size: 14px; cursor: pointer; }
        .btn-export { background: #2d3436; }
        .btn-import { background: #636e72; }
        #toast { visibility: hidden; min-width: 250px; background-color: #333; color: #fff; text-align: center; border-radius: 8px; padding: 16px; position: fixed; z-index: 2000; left: 50%; bottom: 30px; transform: translateX(-50%); font-weight: bold; pointer-events: none; }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        select { padding: 6px; border-radius: 5px; border: 1px solid #ccc; cursor: pointer; }
        @keyframes fadein { from {bottom: 0; opacity:0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
        @media (max-width: 768px) {
            .word-display { justify-content: center; text-align: center; }
            .input-group { width: 100%; flex-direction: column; }
            .btn-check { width: 100%; padding: 15px; }
            .card { padding: 15px; }
            .add-container { flex-direction: column; }
            .btn-tool { flex: 1; text-align: center; }
            .backup-footer { flex-direction: column; align-items: stretch; }
            .btn-backup { width: 100%; }
        }
    </style>
</head>
<body>

    <div id="toast">Operazione completata!</div>

    <div id="editModal" class="modal-overlay">
        <div class="modal-content">
            <h3 id="modalTitle">Modifica Elemento</h3>
            <div id="fieldsA" style="display:none">
                <div class="modal-field"><label>Inglese:</label><textarea id="editEn"></textarea></div>
                <div class="modal-field"><label>Italiano:</label><textarea id="editIt"></textarea></div>
            </div>
            <div id="fieldsC" style="display:none">
                <div class="modal-field"><label>Base:</label><textarea id="editBaseC"></textarea></div>
                <div class="modal-field"><label>Paradigma:</label><textarea id="editFullC"></textarea></div>
                <div class="modal-field"><label>Traduzione:</label><textarea id="editItC"></textarea></div>
            </div>
            <div class="modal-actions">
                <button class="btn-modal btn-cancel" onclick="closeModal()">Annulla</button>
                <button class="btn-modal btn-save" onclick="saveModal()">Salva</button>
            </div>
        </div>
    </div>

    <nav class="main-nav">
        <button id="navA" class="nav-btn active-a" onclick="switchTab('A')">Database 1</button>
        <button id="navD" class="nav-btn" onclick="switchTab('D')">Database 2</button>
        <button id="navB" class="nav-btn" onclick="switchTab('B')">Lesson and Grammar</button>
        <button id="navC" class="nav-btn" onclick="switchTab('C')">Verbi Irregolari</button>
    </nav>

    <section id="sectionA" class="db-section active">

            <div class="card-header">
                <div id="infoA" style="font-size:14px; font-weight:bold; color:var(--blue);"></div>
                <select id="gameModeA" class="card-mode-selector" onchange="syncFromGame('A')">
                    <option value="en">Solo Eng</option>
                    <option value="it">Solo Ita</option>
                    <option value="alt" selected>Modalità Alt</option>
                </select>
            </div>
            <div class="word-display"><span id="displayA">...</span><button onclick="speakItem(dbs.A.current.en)" style="background:none; font-size:30px;">🔊</button></div>
            <div id="gameA">
                <div class="input-group">
                    <input type="text" id="ansA" class="game-input" placeholder="Traduci..." autocomplete="off">
                    <button id="checkA" class="btn-check" onclick="checkGeneric('A')">CONTROLLA</button>
                </div>
                <div id="fbA" class="feedback-area"></div>
                <div class="game-controls">
                    <button class="btn-act btn-edit" onclick="manualEdit('A')">Modifica</button>
                    <button class="btn-act btn-postpone" onclick="togglePause('A')">Posticipa</button>
                    <button class="btn-act btn-delete" onclick="manualDelete('A')">Elimina</button>
                </div>
            </div>
            <button id="restartA" class="btn-restart" onclick="restartSession('A')">RICOMINCIA SESSIONE 🔄</button>
        </div>
        <div class="add-container">
            <input type="text" id="newEnA" class="add-input" placeholder="Parola Inglese" oninput="handleIPhoneBtn('A')" onkeydown="handlePcTranslate(event, 'A', 'en')">
            <input type="text" id="newItA" class="add-input" placeholder="Traduzione Italiana" oninput="handleIPhoneBtn('A')" onkeydown="handlePcTranslate(event, 'A', 'it')">
            <button id="btnAddA" class="btn-add" onclick="smartAdd('A')">AGGIUNGI +</button>
        </div>
        <div class="search-container">
            <input type="text" id="searchA" class="search-input" placeholder="Cerca..." oninput="renderTable('A')">
            <button class="btn-tool" style="background:var(--grey)" onclick="refreshList('A')">🔄 AGGIORNA</button>
            <button class="btn-tool" style="background:var(--orange)" onclick="postponeAll('A')">⏳ POSTICIPA TUTTO</button>
            <button class="btn-tool" style="background:var(--teal)" onclick="reactivateAll('A')">⚡ RIATTIVA TUTTO</button>
            <button class="btn-tool" style="background:var(--blue)" onclick="forceAltRotation('A')">RUOTA ALT 🔄</button>
            <button class="btn-tool" style="background:var(--red)" onclick="deleteAll('A')">🗑️ ELIMINA TUTTO</button>
        </div>
        <div class="admin-panel"><div class="list-header">Lista Database 1</div><div class="scroll-area"><table id="tableA"></table></div></div>
    </section>

    <section id="sectionB" class="db-section">
        <div class="card">
            <div class="card-header">
                <div id="infoB" style="font-size:14px; font-weight:bold; color:var(--purple);"></div>
                <select id="gameModeB" class="card-mode-selector" onchange="syncFromGame('B')">

                    <option value="it">Solo Ita</option>
                    <option value="alt" selected>Modalità Alt</option>
                </select>

                <div class="input-group">

    <section id="sectionC" class="db-section">
        <div class="card">
            <div class="card-header">
                <div id="infoC" style="font-weight: bold; color: #7f8c8d;"></div>
                <select id="gameModeC" class="card-mode-selector" onchange="syncFromGame('C')">
                    <option value="en">Eng -> Ita</option>
                    <option value="it">Ita -> Eng</option>
                    <option value="alt" selected>Modalità Alt</option>
                </select>
            </div>

                <div class="input-group">
                    <input type="text" id="ansC" class="game-input" placeholder="Paradigma o Traduzione..." autocomplete="off">
                    <button id="checkC" class="btn-check" onclick="checkVerb()" style="background:var(--dark-blue)">CONTROLLA</button>
                </div>
                <div id="fbC" class="feedback-area"></div>
                <div class="game-controls">
                    <button class="btn-act btn-edit" onclick="manualEdit('C')">Modifica</button>
                    <button class="btn-act btn-postpone" onclick="togglePause('C')">Posticipa</button>
                    <button class="btn-act btn-delete" onclick="manualDelete('C')">Elimina</button>
                </div>

        </div>

            <input type="text" id="searchC" class="search-input" placeholder="Cerca..." oninput="renderTable('C')">
            <button class="btn-tool" style="background:var(--grey)" onclick="refreshList('C')">🔄 AGGIORNA</button>
            <button class="btn-tool" style="background:var(--orange)" onclick="postponeAll('C')">⏳ POSTICIPA TUTTO</button>
            <button class="btn-tool" style="background:var(--teal)" onclick="reactivateAll('C')">⚡ RIATTIVA TUTTO</button>

    <div class="backup-footer">
        <button class="btn-backup btn-export" onclick="exportData()">💾 ESPORTA TUTTI I DATI (BACKUP)</button>

        <input type="file" id="importFile" style="display:none" onchange="importData(event)">
    </div>

<script>
    const isIPhone = /iPhone|iPod|iPad/i.test(navigator.userAgent);
    const APP_PREFIX = 'GITHUB_PROJECT_1';
    let dbs = {
        A: { key: APP_PREFIX + '_DATABASE_A', data: [], deck: [], current: null },
        D: { key: APP_PREFIX + '_DATABASE_D', data: [], deck: [], current: null },
        B: { key: APP_PREFIX + '_DATABASE_B', data: [], deck: [], current: null },
        C: { key: APP_PREFIX + '_VERBI_PRO', data: [], deck: [], current: null }
    };
    let currentEditState = { t: null, i: null };

    // --- FUNZIONI MODIFICATE PER RISOLVERE IL TUO PROBLEMA ---
    function deleteItem(t, idx) {
        const itemToDelete = dbs[t].data[idx];
        if (confirm("Eliminare l'elemento?")) {
            const isPlayingThisWord = dbs[t].current && dbs[t].current.id === itemToDelete.id;
            dbs[t].data.splice(idx, 1);
            save(t);
            renderTable(t);
            showToast("Eliminato");
            // Se stavi giocando proprio questa parola, passa alla prossima SENZA ricaricare la pagina
            if (isPlayingThisWord) {
                t === 'C' ? nextVerb(true) : nextCard(t, true);
            }
        }
    }

    function postponeItem(t, idx, status) {
        const itemToPostpone = dbs[t].data[idx];
        itemToPostpone.paused = status;
        save(t);
        renderTable(t);
        showToast(status ? "Posticipato" : "Riattivato");
        // Se hai posticipato la parola in corso, passa alla prossima SENZA ricaricare
        if (status && dbs[t].current && dbs[t].current.id === itemToPostpone.id) {
            t === 'C' ? nextVerb(true) : nextCard(t, true);
        }
    }

    // --- RESTO DEL CODICE ORIGINALE INVARIATO ---
    function manualEdit(t, i) {
        let item = (i === undefined) ? dbs[t].current : dbs[t].data[i];
        if (!item) return;
        currentEditState = { t, i };
        document.getElementById('editModal').style.display = 'flex';
        if (t === 'C') {
            document.getElementById('fieldsA').style.display = 'none';
            document.getElementById('fieldsC').style.display = 'block';
            document.getElementById('editBaseC').value = item.base;
            document.getElementById('editFullC').value = item.full;
            document.getElementById('editItC').value = item.it;
        } else {
            document.getElementById('fieldsC').style.display = 'none';
            document.getElementById('fieldsA').style.display = 'block';
            document.getElementById('editEn').value = item.en;
            document.getElementById('editIt').value = item.it;
        }
    }

    function saveModal() {
        const { t, i } = currentEditState;
        let item = (i === undefined) ? dbs[t].current : dbs[t].data[i];
        if (t === 'C') {
            item.base = document.getElementById('editBaseC').value.trim();
            item.full = document.getElementById('editFullC').value.trim();
            item.it = document.getElementById('editItC').value.trim();
            if (i === undefined) nextVerb(true);
        } else {
            item.en = document.getElementById('editEn').value.trim();
            item.it = document.getElementById('editIt').value.trim();
            if (i === undefined) nextCard(t, true);
        }
        save(t);
        renderTable(t);
        closeModal();
        showToast("Salvato!");
    }

    function closeModal() { document.getElementById('editModal').style.display = 'none'; }

    async function translateText(text, from, to) {
        if(!text || text.trim() === "") return "";
        try {
            const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=${from}&tl=${to}&dt=t&q=${encodeURIComponent(text)}`);
            const json = await res.json();
            return json[0][0][0];
        } catch (e) { return ""; }
    }

    async function handlePcTranslate(e, t, sourceLang) {
        if (isIPhone || e.key !== 'Enter') return;
        const enIn = document.getElementById('newEn' + t), itIn = document.getElementById('newIt' + t);
        if(enIn.value && itIn.value) { addNewItem(t); return; }
        if (sourceLang === 'en' && enIn.value && !itIn.value) {
            itIn.placeholder = "Traduco...";
            itIn.value = await translateText(enIn.value, 'en', 'it');
            itIn.placeholder = "Traduzione Italiana";
        } else if (sourceLang === 'it' && itIn.value && !enIn.value) {
            enIn.placeholder = "Traduco...";
            enIn.value = await translateText(itIn.value, 'it', 'en');
            enIn.placeholder = "Parola Inglese";
        }
    }

    function handleIPhoneBtn(t) {
        if (!isIPhone) return;
        const btn = document.getElementById('btnAdd' + t), enVal = document.getElementById('newEn' + t).value, itVal = document.getElementById('newIt' + t).value;
        if ((enVal && !itVal) || (itVal && !enVal)) {
            btn.innerText = "TRADUCI";
            btn.style.background = "#3498db";
        } else {
            btn.innerText = "AGGIUNGI +";
            if(t === 'A') btn.style.background = "#27ae60";
            else if(t === 'D') btn.style.background = "var(--pink)";
            else if(t === 'B') btn.style.background = "#6f42c1";
        }
    }

    async function smartAdd(t) {
        const btn = document.getElementById('btnAdd' + t), enIn = document.getElementById('newEn' + t), itIn = document.getElementById('newIt' + t);
        if (isIPhone && btn.innerText === "TRADUCI") {
            if (enIn.value && !itIn.value) itIn.value = await translateText(enIn.value, 'en', 'it');
            else if (itIn.value && !enIn.value) enIn.value = await translateText(itIn.value, 'it', 'en');
            handleIPhoneBtn(t);
        } else { addNewItem(t); }
    }

    function speakItem(text) {
        if (!text) return;
        window.speechSynthesis.cancel();
        let cleanText = text.replace(/[/\\|()]/g, ' ');
        const msg = new SpeechSynthesisUtterance(cleanText);
        msg.lang = 'en-US';
        window.speechSynthesis.speak(msg);
    }

    function showToast(msg) {
        const t = document.getElementById("toast");
        t.innerText = msg;
        t.className = "show";
        setTimeout(() => { t.className = t.className.replace("show", ""); }, 3000);
    }

    function init() {
        ['A', 'D', 'B', 'C'].forEach(t => {
            let saved = localStorage.getItem(dbs[t].key);
            dbs[t].data = saved ? JSON.parse(saved) : [];
            save(t);
            buildDeck(t);
            t === 'C' ? nextVerb() : nextCard(t);
            renderTable(t);
        });
    }

    function buildDeck(t) {
        dbs[t].deck = dbs[t].data.filter(item => !item.paused);
        dbs[t].deck.sort(() => Math.random() - 0.5);
    }

    function save(t) { localStorage.setItem(dbs[t].key, JSON.stringify(dbs[t].data)); }

    function switchTab(t) {
        document.querySelectorAll('.db-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => {
            b.classList.remove('active-a','active-d','active-b','active-c');
            if(b.id === 'nav'+t) b.classList.add('active-'+t.toLowerCase());
        });
        document.getElementById('section' + t).classList.add('active');
        renderTable(t);
    }

    function nextCard(t, forceNext = false) {
        if (dbs[t].deck.length === 0) {
            document.getElementById('game' + t).style.display = 'none';
            document.getElementById('restart' + t).style.display = 'block';
            document.getElementById('display' + t).innerText = "Sessione finita!";
            document.getElementById('info' + t).innerText = "";
            return;
        }
        if (!dbs[t].current || forceNext) {
            dbs[t].current = dbs[t].deck.pop();
            if (dbs[t].current.mode === 'alt' && !forceNext) {
                dbs[t].current.lastAltState = (dbs[t].current.lastAltState === 'it') ? 'en' : 'it';
                save(t);
            }
        }
        const item = dbs[t].current;
        const mode = (item.mode === 'alt') ? item.lastAltState : item.mode;
        document.getElementById('display' + t).innerText = (mode === 'en') ? item.en : item.it;
        document.getElementById('ans' + t).value = "";
        document.getElementById('fb' + t).innerText = "";
        document.getElementById('game' + t).style.display = 'block';
        document.getElementById('restart' + t).style.display = 'none';
        updateInfo(t);
    }

    function nextVerb(forceNext = false) {
        const t = 'C';
        if (dbs[t].deck.length === 0) {
            document.getElementById('gameC').style.display = 'none';
            document.getElementById('restartC').style.display = 'block';
            document.getElementById('displayC').innerText = "Sessione finita!";
            document.getElementById('infoC').innerText = "";
            return;
        }
        if (!dbs[t].current || forceNext) {
            dbs[t].current = dbs[t].deck.pop();
            if (dbs[t].current.mode === 'alt' && !forceNext) {
                dbs[t].current.lastAltState = (dbs[t].current.lastAltState === 'it') ? 'en' : 'it';
                save(t);
            }
        }
        const item = dbs[t].current;
        const mode = (item.mode === 'alt') ? item.lastAltState : item.mode;
        document.getElementById('displayC').innerText = (mode === 'en') ? item.base : item.it;
        document.getElementById('ansC').value = "";
        document.getElementById('fbC').innerText = "";
        document.getElementById('gameC').style.display = 'block';
        document.getElementById('restartC').style.display = 'none';
        updateInfo('C');
    }

    function updateInfo(t) {
        const total = dbs[t].data.length;
        const active = dbs[t].data.filter(i => !i.paused).length;
        const rem = dbs[t].deck.length + (dbs[t].current ? 1 : 0);
        document.getElementById('info' + t).innerText = `Totale: ${total} | Attivi: ${active} | Rimanenti: ${rem}`;
    }

    function checkGeneric(t) {
        const item = dbs[t].current;
        if (!item) return;
        const ans = document.getElementById('ans' + t).value.trim().toLowerCase();
        const mode = (item.mode === 'alt') ? item.lastAltState : item.mode;
        const target = (mode === 'en') ? item.it : item.en;
        const fb = document.getElementById('fb' + t);
        if (ans === target.toLowerCase()) {
            fb.innerText = "CORRETTO! 🎉";
            fb.style.color = "var(--green)";
            setTimeout(() => nextCard(t, true), 800);
        } else {
            fb.innerText = "Sbagliato. Risposta: " + target.toUpperCase();
            fb.style.color = "var(--red)";
        }
    }

    function checkVerb() {
        const item = dbs.C.current;
        if (!item) return;
        const ans = document.getElementById('ansC').value.trim().toLowerCase();
        const mode = (item.mode === 'alt') ? item.lastAltState : item.mode;
        const target = (mode === 'en') ? item.full : item.base;
        const fb = document.getElementById('fbC');
        if (ans === target.toLowerCase()) {
            fb.innerText = "CORRETTO! 🎉";
            fb.style.color = "var(--green)";
            setTimeout(() => nextVerb(true), 800);
        } else {
            fb.innerText = "Sbagliato. Risposta: " + target.toUpperCase();
            fb.style.color = "var(--red)";
        }
    }

    function togglePause(t) {
        if (!dbs[t].current) return;
        dbs[t].current.paused = true;
        save(t);
        showToast("Elemento posticipato");
        renderTable(t);
        t === 'C' ? nextVerb(true) : nextCard(t, true);
    }

    function manualDelete(t) {
        if (!dbs[t].current) return;
        if (confirm("Eliminare definitivamente questo elemento?")) {
            dbs[t].data = dbs[t].data.filter(i => i.id !== dbs[t].current.id);
            save(t);
            showToast("Elemento eliminato");
            renderTable(t);
            t === 'C' ? nextVerb(true) : nextCard(t, true);
        }
    }

    function addNewItem(t) {
        if (t === 'C') {
            const base = document.getElementById('newBaseC').value.trim();
            const full = document.getElementById('newFullC').value.trim();
            const it = document.getElementById('newItC').value.trim();
            if (!base || !full || !it) return;
            dbs.C.data.push({ id: Date.now(), base, full, it, mode: 'alt', lastAltState: 'it', paused: false });
            document.getElementById('newBaseC').value = "";
            document.getElementById('newFullC').value = "";
            document.getElementById('newItC').value = "";
        } else {
            const en = document.getElementById('newEn' + t).value.trim();
            const it = document.getElementById('newIt' + t).value.trim();
            if (!en || !it) return;
            dbs[t].data.push({ id: Date.now(), en, it, mode: 'alt', lastAltState: 'it', paused: false });
            document.getElementById('newEn' + t).value = "";
            document.getElementById('newIt' + t).value = "";
            if (isIPhone) handleIPhoneBtn(t);
        }
        save(t);
        renderTable(t);
        showToast("Aggiunto!");
    }

    function restartSession(t) {
        buildDeck(t);
        t === 'C' ? nextVerb(true) : nextCard(t, true);
        showToast("Sessione riavviata");
    }

    function renderTable(t) {
        const table = document.getElementById('table' + t);
        const search = document.getElementById('search' + t).value.toLowerCase();
        let filtered = dbs[t].data.filter(item => {
            if (t === 'C') return item.base.toLowerCase().includes(search) || item.full.toLowerCase().includes(search) || item.it.toLowerCase().includes(search);
            return item.en.toLowerCase().includes(search) || item.it.toLowerCase().includes(search);
        });
        filtered.sort((a,b) => b.id - a.id);

        let html = `<tr><th class="col-idx">#</th><th class="col-main">${t==='C'?'Base':'Inglese'}</th><th class="col-trans">${t==='C'?'Paradigma / Trad.':'Traduzione'}</th><th>Modalità</th><th>Azioni</th></tr>`;
        filtered.forEach((item, idx) => {
            const isCurrent = dbs[t].current && item.id === dbs[t].current.id;
            const rowClass = isCurrent ? 'class="list-active-highlight"' : '';
            html += `<tr ${item.paused ? 'style="opacity:0.6; background:#f9f9f9;"' : ''}>
                <td>${idx + 1}</td>
                <td class="col-main"><span ${rowClass}>${t==='C'?item.base:item.en}</span></td>
                <td class="col-trans"><div class="hidden-text">${t==='C'?item.full + ' - ' + item.it : item.it}</div></td>
                <td>
                    <select onchange="updateItemMode('${t}', ${dbs[t].data.indexOf(item)}, this.value)">
                        <option value="alt" ${item.mode==='alt'?'selected':''}>Alt</option>
                        <option value="en" ${item.mode==='en'?'selected':''}>${t==='C'?'Base':'Eng'}</option>
                        <option value="it" ${item.mode==='it'?'selected':''}>Ita</option>
                    </select>
                </td>
                <td style="display:flex; gap:5px; justify-content:center;">
                    <button class="list-btn btn-edit-list" onclick="manualEdit('${t}', ${dbs[t].data.indexOf(item)})">✏️</button>
                    ${item.paused ? 
                        `<button class="list-btn btn-reactivate-list" onclick="postponeItem('${t}', ${dbs[t].data.indexOf(item)}, false)">⚡</button>` : 
                        `<button class="list-btn btn-postpone-list" onclick="postponeItem('${t}', ${dbs[t].data.indexOf(item)}, true)">⏳</button>`
                    }
                    <button class="list-btn btn-trash-list" onclick="deleteItem('${t}', ${dbs[t].data.indexOf(item)})">🗑️</button>
                </td>
            </tr>`;
        });
        table.innerHTML = html;
        updateInfo(t);
    }

    function updateItemMode(t, idx, mode) {
        dbs[t].data[idx].mode = mode;
        if(mode === 'alt') dbs[t].data[idx].lastAltState = 'it';
        save(t);
        showToast("Modalità aggiornata");
    }

    function syncFromGame(t) {
        const mode = document.getElementById('gameMode' + t).value;
        dbs[t].data.forEach(item => {
            item.mode = mode;
            if(mode === 'alt') item.lastAltState = 'it';
        });
        save(t);
        renderTable(t);
        t === 'C' ? nextVerb(true) : nextCard(t, true);
        showToast("Modalità sincronizzata");
    }

    function postponeAll(t) {
        dbs[t].data.forEach(i => i.paused = true);
        save(t); renderTable(t); showToast("Tutti posticipati");
        t === 'C' ? nextVerb(true) : nextCard(t, true);
    }

    function reactivateAll(t) {
        dbs[t].data.forEach(i => i.paused = false);
        save(t); renderTable(t); showToast("Tutti riattivati");
    }

    function deleteAll(t) {
        if (confirm("Eliminare TUTTI i dati di questo database?")) {
            dbs[t].data = []; save(t); renderTable(t); showToast("Database svuotato");
            t === 'C' ? nextVerb(true) : nextCard(t, true);
        }
    }

    function forceAltRotation(t) {
        dbs[t].data.forEach(w => { if(w.mode === 'alt') w.lastAltState = (w.lastAltState === 'it' ? 'en' : 'it'); });
        save(t); renderTable(t); showToast("Rotazione completata");
        t === 'C' ? nextVerb(true) : nextCard(t, true);
    }

    function refreshList(t) { renderTable(t); showToast("Lista aggiornata"); }

    function exportData() {
        const bundle = { A: dbs.A.data, D: dbs.D.data, B: dbs.B.data, C: dbs.C.data };
        const blob = new Blob([JSON.stringify(bundle, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `flashcards_backup_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
    }

    function importData(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const imported = JSON.parse(e.target.result);
                let addedCount = 0; let updatedCount = 0;
                ['A', 'D', 'B', 'C'].forEach(t => {
                    const importedList = Array.isArray(imported[t]) ? imported[t] : (imported[t]?.data || []);
                    importedList.forEach(newItem => {
                        let existingIndex = dbs[t].data.findIndex(item => item.id === newItem.id);
                        if (existingIndex !== -1) {
                            let existing = dbs[t].data[existingIndex];
                            let changed = (t === 'C') ? (existing.base !== newItem.base || existing.full !== newItem.full || existing.it !== newItem.it) : (existing.en !== newItem.en || existing.it !== newItem.it);
                            if (changed) { dbs[t].data[existingIndex] = { ...existing, ...newItem }; updatedCount++; }
                        } else {
                            dbs[t].data.push(newItem); addedCount++;
                        }
                    });
                    save(t);
                });
                alert(`Sincronizzazione completata!\nAggiunti: ${addedCount}\nAggiornati: ${updatedCount}`);
                location.reload();
            } catch(err) { alert("Errore nel caricamento del file."); }
        };
        reader.readAsText(file);
    }
    window.onload = init;
</script>
</body>
</html>
