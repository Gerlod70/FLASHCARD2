<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flashcards Pro - SECONDO SITO</title>
    <style>
        :root { --blue: #007bff; --purple: #6f42c1; --dark-blue: #2c3e50; --bg: #f4f7f9; --text-dark: #2d3436; --deep-blue: #0984e3; --light-gray: #f1f2f6; --red: #e74c3c; --green: #27ae60; --orange: #f39c12; --teal: #00cec9; --grey: #636e72; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; padding-bottom: 80px; color: var(--text-dark); overflow-x: hidden; width: 100vw; }
        button, .nav-btn, .list-btn { transition: transform 0.1s ease, opacity 0.1s ease; outline: none; cursor: pointer; border: none; }
        button:active, .nav-btn:active, .list-btn:active { transform: scale(0.92); opacity: 0.7; }
        .main-nav { background: #2c3e50; width: 100%; display: flex; justify-content: center; padding: 12px 0; gap: 15px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.2); flex-wrap: wrap; }
        .nav-btn { padding: 10px 20px; border-radius: 6px; font-weight: bold; color: white; background: #455a64; font-size: 14px; }
        .nav-btn.active-a { background: var(--blue); }
        .nav-btn.active-b { background: var(--purple); }
        .nav-btn.active-c { background: var(--dark-blue); border: 1px solid white; }
        .card { background: white; width: 95%; max-width: 800px; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; margin: 20px 0; border-top: 8px solid #ddd; }
        #sectionA .card { border-color: var(--blue); }
        #sectionB .card { border-color: var(--purple); }
        #sectionC .card { border-color: var(--dark-blue); }
        .word-display { font-size: 32px; font-weight: 800; margin: 20px 0; min-height: 50px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .input-group { display: flex; width: 90%; margin: 0 auto 10px; gap: 10px; }
        .game-input { flex: 1; padding: 15px; border: 2px solid #b2bec3; border-radius: 10px; font-size: 18px; text-align: center; }
        .btn-check { padding: 0 20px; border-radius: 10px; font-weight: bold; color: white; background: #2d3436; }
        .feedback-area { font-weight: 900; font-size: 22px; min-height: 30px; margin-top: 10px; }
        .db-section { display: none; width: 100%; flex-direction: column; align-items: center; }
        .db-section.active { display: flex; }
        .add-container { display: flex; gap: 10px; margin-bottom: 15px; width: 95%; max-width: 800px; }
        .add-input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
        .admin-panel { background: white; width: 95%; max-width: 1000px; border-radius: 12px; border: 1px solid #dfe6e9; margin-top: 20px; overflow: hidden; }
        .scroll-area { max-height: 500px; overflow-y: auto; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: #2d3436; color: white; padding: 12px; font-size: 12px; position: sticky; top: 0; }
        td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; font-size: 14px; }
        .hidden-text { background: var(--light-gray); color: var(--deep-blue); padding: 8px; border-radius: 6px; cursor: pointer; filter: blur(4px); transition: 0.2s; }
        .hidden-text:hover { filter: blur(0); }
        #toast { visibility: hidden; min-width: 200px; background: #333; color: #fff; text-align: center; border-radius: 8px; padding: 16px; position: fixed; left: 50%; bottom: 30px; transform: translateX(-50%); z-index: 2000; }
        #toast.show { visibility: visible; }
    </style>
</head>
<body>

    <div id="toast">Operazione completata!</div>

    <nav class="main-nav">
        <button id="navA" class="nav-btn active-a" onclick="switchTab('A')">Database 1</button>
        <button id="navB" class="nav-btn" onclick="switchTab('B')">Lesson</button>
        <button id="navC" class="nav-btn" onclick="switchTab('C')">Verbi</button>
    </nav>

    <section id="sectionA" class="db-section active">
        <div class="card">
            <div id="infoA" style="font-weight:bold; margin-bottom:10px;"></div>
            <div class="word-display"><span id="displayA">...</span><button onclick="speakItem('A')" style="background:none; font-size:25px;">🔊</button></div>
            <div class="input-group">
                <input type="text" id="ansA" class="game-input" placeholder="Traduci..." autocomplete="off">
                <button class="btn-check" onclick="checkAnswer('A')">CONTROLLA</button>
            </div>
            <div id="fbA" class="feedback-area"></div>
        </div>
        <div class="add-container">
            <input type="text" id="newEnA" class="add-input" placeholder="Inglese">
            <input type="text" id="newItA" class="add-input" placeholder="Italiano">
            <button onclick="addNewItem('A')" style="background:var(--green); color:white; padding:10px 15px; border-radius:6px; font-weight:bold;">AGGIUNGI</button>
        </div>
        <div class="admin-panel"><div class="scroll-area"><table id="tableA"></table></div></div>
    </section>

    <section id="sectionB" class="db-section">
        <div class="card">
            <div id="infoB" style="font-weight:bold; margin-bottom:10px;"></div>
            <div class="word-display"><span id="displayB">...</span><button onclick="speakItem('B')" style="background:none; font-size:25px;">🔊</button></div>
            <div class="input-group">
                <input type="text" id="ansB" class="game-input" placeholder="Traduci..." autocomplete="off">
                <button class="btn-check" onclick="checkAnswer('B')" style="background:var(--purple)">CONTROLLA</button>
            </div>
            <div id="fbB" class="feedback-area"></div>
        </div>
        <div class="add-container">
            <input type="text" id="newEnB" class="add-input" placeholder="Inglese">
            <input type="text" id="newItB" class="add-input" placeholder="Italiano">
            <button onclick="addNewItem('B')" style="background:var(--purple); color:white; padding:10px 15px; border-radius:6px; font-weight:bold;">AGGIUNGI</button>
        </div>
        <div class="admin-panel"><div class="scroll-area"><table id="tableB"></table></div></div>
    </section>

    <section id="sectionC" class="db-section">
        <div class="card">
            <div id="infoC" style="font-weight:bold; margin-bottom:10px;"></div>
            <div class="word-display"><span id="displayC">...</span></div>
            <div class="input-group">
                <input type="text" id="ansC" class="game-input" placeholder="Paradigma..." autocomplete="off">
                <button class="btn-check" onclick="checkVerb()" style="background:var(--dark-blue)">CONTROLLA</button>
            </div>
            <div id="fbC" class="feedback-area"></div>
        </div>
        <div class="add-container">
            <input type="text" id="newBaseC" class="add-input" placeholder="Base">
            <input type="text" id="newFullC" class="add-input" placeholder="Paradigma">
            <input type="text" id="newItC" class="add-input" placeholder="Traduzione">
            <button onclick="addNewItem('C')" style="background:var(--dark-blue); color:white; padding:10px 15px; border-radius:6px; font-weight:bold;">AGGIUNGI</button>
        </div>
        <div class="admin-panel"><div class="scroll-area"><table id="tableC"></table></div></div>
    </section>

    <script>
        // CHIAVI UNICHE PER IL SECONDO SITO
        const dbs = {
            A: { key: 'db_a_SECONDO', data: [], deck: [], current: null },
            B: { key: 'db_b_SECONDO', data: [], deck: [], current: null },
            C: { key: 'db_c_SECONDO', data: [], deck: [], current: null }
        };

        function init() {
            ['A', 'B', 'C'].forEach(t => {
                const saved = localStorage.getItem(dbs[t].key);
                if (saved) dbs[t].data = JSON.parse(saved);
                buildDeck(t);
            });
            switchTab('A');
        }

        function switchTab(t) {
            document.querySelectorAll('.db-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-a', 'active-b', 'active-c'));
            document.getElementById('section' + t).classList.add('active');
            document.getElementById('nav' + t).classList.add('active-' + t.toLowerCase());
            renderTable(t);
            nextCard(t);
        }

        function buildDeck(t) {
            dbs[t].deck = dbs[t].data.filter(i => !i.paused).sort(() => Math.random() - 0.5);
        }

        function nextCard(t) {
            if (dbs[t].deck.length === 0) buildDeck(t);
            const disp = document.getElementById('display' + t);
            if (dbs[t].deck.length === 0) {
                disp.innerText = "DATABASE VUOTO";
                dbs[t].current = null;
            } else {
                dbs[t].current = dbs[t].deck.pop();
                disp.innerText = dbs[t].current.en ? dbs[t].current.en.toUpperCase() : dbs[t].current.base.toUpperCase();
            }
            updateInfo(t);
        }

        function checkAnswer(t) {
            const item = dbs[t].current;
            const ans = document.getElementById('ans' + t).value.trim().toLowerCase();
            const fb = document.getElementById('fb' + t);
            if (!item) return;
            if (ans === item.it.toLowerCase()) {
                fb.innerText = "CORRETTO!"; fb.style.color = "var(--green)";
                setTimeout(() => { fb.innerText = ""; document.getElementById('ans' + t).value = ""; nextCard(t); }, 800);
            } else {
                fb.innerText = "ERRORE: " + item.it.toUpperCase(); fb.style.color = "var(--red)";
            }
        }

        function checkVerb() {
            const item = dbs.C.current;
            const ans = document.getElementById('ansC').value.trim().toLowerCase();
            const fb = document.getElementById('fbC');
            if (!item) return;
            if (ans === item.full.toLowerCase()) {
                fb.innerText = "CORRETTO!"; fb.style.color = "var(--green)";
                setTimeout(() => { fb.innerText = ""; document.getElementById('ansC').value = ""; nextCard('C'); }, 800);
            } else {
                fb.innerText = "ERRORE: " + item.full.toUpperCase(); fb.style.color = "var(--red)";
            }
        }

        function addNewItem(t) {
            if (t === 'C') {
                const b = document.getElementById('newBaseC').value.trim();
                const f = document.getElementById('newFullC').value.trim();
                const i = document.getElementById('newItC').value.trim();
                if (b && f && i) dbs.C.data.push({ base: b, full: f, it: i, paused: false });
            } else {
                const en = document.getElementById('newEn' + t).value.trim();
                const it = document.getElementById('newIt' + t).value.trim();
                if (en && it) dbs[t].data.push({ en, it, paused: false });
            }
            save(t); renderTable(t); showToast("Aggiunto!");
        }

        function renderTable(t) {
            const table = document.getElementById('table' + t);
            table.innerHTML = `<tr><th>Elemento</th><th>Traduzione</th><th>Azioni</th></tr>`;
            dbs[t].data.forEach((item, idx) => {
                const row = table.insertRow();
                row.insertCell(0).innerText = item.en || item.base;
                row.insertCell(1).innerHTML = `<div class="hidden-text">${item.it}</div>`;
                const delBtn = document.createElement('button');
                delBtn.innerText = "🗑️";
                delBtn.onclick = () => { dbs[t].data.splice(idx, 1); save(t); renderTable(t); };
                row.insertCell(2).appendChild(delBtn);
            });
        }

        function save(t) { localStorage.setItem(dbs[t].key, JSON.stringify(dbs[t].data)); }
        function showToast(m) { const t = document.getElementById("toast"); t.innerText = m; t.className = "show"; setTimeout(() => t.className = "", 3000); }
        function updateInfo(t) { document.getElementById('info' + t).innerText = "Elementi: " + dbs[t].data.length; }
        function speakItem(t) { if (dbs[t].current) { const m = new SpeechSynthesisUtterance(dbs[t].current.en); m.lang = 'en-US'; window.speechSynthesis.speak(m); } }

        window.onload = init;
    </script>
</body>
</html>
