<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flashcards Pro - Multi-DB System</title>
    <style>
        :root { --blue: #007bff; --purple: #6f42c1; --dark-blue: #2c3e50; --bg: #f4f7f9; --text-dark: #2d3436; --deep-blue: #0984e3; --light-gray: #f1f2f6; --red: #e74c3c; --green: #27ae60; --orange: #f39c12; --teal: #00cec9; --grey: #636e72; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; padding-bottom: 80px; color: var(--text-dark); overflow-x: hidden; width: 100vw; }
        button, .nav-btn, .list-btn { transition: transform 0.1s ease, opacity 0.1s ease; outline: none; cursor: pointer; border: none; }
        button:active, .nav-btn:active, .list-btn:active { transform: scale(0.92); opacity: 0.7; }
        
        .main-nav { background: #2c3e50; width: 100%; display: flex; justify-content: center; padding: 12px 0; gap: 15px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.2); flex-wrap: wrap; }
        .nav-btn { padding: 10px 20px; border-radius: 6px; font-weight: bold; color: white; background: #455a64; font-size: 14px; }
        .nav-btn.active-a { background: var(--blue); }
        .nav-btn.active-b { background: var(--purple); }
        .nav-btn.active-c { background: var(--dark-blue); border: 1px solid white; }
        .nav-btn.active-clone { background: var(--teal); }

        .card { background: white; width: 95%; max-width: 1000px; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; margin: 20px 0; border-top: 8px solid #ddd; box-sizing: border-box; }
        #sectionA .card { border-color: var(--blue); }
        #sectionB .card { border-color: var(--purple); }
        #sectionC .card { border-color: var(--dark-blue); }
        #sectionClone .card { border-color: var(--teal); }

        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .card-mode-selector { padding: 5px 10px; border-radius: 8px; border: 1px solid #ddd; background: #f8f9fa; font-size: 13px; font-weight: bold; }

        .word-display { font-size: 34px; font-weight: 800; margin: 25px auto; display: flex; align-items: center; justify-content: center; gap: 15px; min-height: 60px; color: #1a1a1a; }
        .input-group { display: flex; width: 85%; margin: 0 auto 10px; gap: 10px; }
        .game-input { flex: 1; padding: 18px; border: 2px solid #b2bec3; border-radius: 10px; font-size: 22px; text-align: center; }
        .btn-check { width: 180px; border-radius: 10px; font-weight: bold; color: white; background: #2d3436; font-size: 16px; text-transform: uppercase; }
        .feedback-area { margin: 10px auto; font-weight: 900; font-size: 26px; min-height: 45px; color: var(--deep-blue); }

        .game-controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 85%; margin: 0 auto; }
        .btn-act { padding: 14px; border-radius: 8px; color: white; font-weight: bold; font-size: 14px; text-transform: uppercase; }
        .btn-edit { background: #636e72; }
        .btn-postpone { background: var(--orange); }
        .btn-delete { background: var(--red); }

        .db-section { display: none; width: 100%; flex-direction: column; align-items: center; }
        .db-section.active { display: flex; }

        .admin-panel { background: white; width: 95%; max-width: 1200px; border-radius: 15px; border: 1px solid #dfe6e9; overflow: hidden; margin-top: 20px; }
        .scroll-area { max-height: 500px; overflow-y: auto; overflow-x: auto; }
        table { width: 100%; min-width: 800px; border-collapse: collapse; }
        th { background: #2d3436; color: white; padding: 15px; font-size: 12px; position: sticky; top: 0; }
        td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; }

        .hidden-text { background: var(--light-gray); color: var(--deep-blue); padding: 8px; border-radius: 6px; cursor: pointer; filter: blur(4px); transition: 0.2s; }
        .hidden-text:hover { filter: blur(0); }

        #toast { visibility: hidden; min-width: 250px; background: #333; color: #fff; text-align: center; border-radius: 8px; padding: 16px; position: fixed; left: 50%; bottom: 30px; transform: translateX(-50%); z-index: 2000; }
        #toast.show { visibility: visible; }
        
        .clone-footer { margin-top: 50px; padding: 20px; border-top: 2px dashed #ccc; width: 100%; text-align: center; }
        .btn-clone { background: var(--teal); color: white; padding: 20px 40px; border-radius: 12px; font-weight: bold; font-size: 18px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <div id="toast">Operazione completata!</div>

    <nav class="main-nav" id="mainNav">
        <button id="navA" class="nav-btn active-a" onclick="switchTab('A')">Database 1</button>
        <button id="navB" class="nav-btn" onclick="switchTab('B')">Lesson</button>
        <button id="navC" class="nav-btn" onclick="switchTab('C')">Verbi</button>
    </nav>

    <section id="sectionA" class="db-section active">
        <div class="card">
            <div class="card-header">
                <div id="infoA" style="font-weight:bold; color:var(--blue);"></div>
                <select id="gameModeA" class="card-mode-selector" onchange="syncFromGame('A')">
                    <option value="en">Solo Eng</option>
                    <option value="it">Solo Ita</option>
                    <option value="alt">Modalità Alt</option>
                </select>
            </div>
            <div class="word-display"><span id="displayA">...</span></div>
            <div class="input-group">
                <input type="text" id="ansA" class="game-input" placeholder="Traduci..." autocomplete="off">
                <button class="btn-check" onclick="checkGeneric('A')">CONTROLLA</button>
            </div>
            <div id="fbA" class="feedback-area"></div>
            <div class="game-controls">
                <button class="btn-act btn-edit" onclick="manualEdit('A')">Modifica</button>
                <button class="btn-act btn-postpone" onclick="togglePause('A')">Posticipa</button>
                <button class="btn-act btn-delete" onclick="manualDelete('A')">Elimina</button>
            </div>
        </div>
        <div class="admin-panel"><div class="scroll-area"><table id="tableA"></table></div></div>
    </section>

    <section id="sectionB" class="db-section"></section>
    <section id="sectionC" class="db-section"></section>
    <section id="sectionClone" class="db-section"></section>

    <div class="clone-footer">
        <button class="btn-clone" onclick="createNewClone()">➕ CREA NUOVO DATABASE CLONE (ESTESO)</button>
        <p style="font-size: 12px; color: #666; margin-top: 10px;">Questo creerà un nuovo spazio di lavoro indipendente con le stesse funzioni del primo.</p>
    </div>

    <script>
        // Sistema Dinamico di Database
        let dbs = {
            A: { key: 'db_main_A', data: [], deck: [], current: null },
            B: { key: 'db_main_B', data: [], deck: [], current: null },
            C: { key: 'db_main_C', data: [], deck: [], current: null }
        };

        // Verifica se esistono database clonati salvati
        const savedClones = localStorage.getItem('active_clones');
        if(savedClones) {
            const clones = JSON.parse(savedClones);
            clones.forEach(id => {
                dbs[id] = { key: 'db_clone_' + id, data: [], deck: [], current: null };
                addCloneToNav(id);
            });
        }

        function init() {
            Object.keys(dbs).forEach(t => {
                let saved = localStorage.getItem(dbs[t].key);
                dbs[t].data = saved ? JSON.parse(saved) : [];
                buildDeck(t);
            });
            switchTab('A');
        }

        function buildDeck(t) {
            const now = Date.now();
            dbs[t].deck = dbs[t].data.filter(w => !w.nextReview || now > w.nextReview).sort(() => Math.random() - 0.5);
            nextCard(t);
        }

        function nextCard(t) {
            if (dbs[t].deck.length === 0) {
                if(document.getElementById('display' + t)) document.getElementById('display' + t).innerText = "FINITO ✅";
                return;
            }
            dbs[t].current = dbs[t].deck.pop();
            updateDisplay(t);
        }

        function updateDisplay(t) {
            const disp = document.getElementById('display' + t);
            if(!disp || !dbs[t].current) return;
            const mode = document.getElementById('gameMode' + t).value;
            disp.innerText = (mode === 'it' ? dbs[t].current.it : dbs[t].current.en).toUpperCase();
            updateInfo(t);
        }

        function checkGeneric(t) {
            const fb = document.getElementById('fb' + t);
            const mode = document.getElementById('gameMode' + t).value;
            const target = (mode === 'it' ? dbs[t].current.en : dbs[t].current.it);
            fb.innerText = target.toUpperCase();
            setTimeout(() => { fb.innerText = ""; nextCard(t); }, 2000);
        }

        function createNewClone() {
            const id = 'DB' + Date.now();
            dbs[id] = { key: 'db_clone_' + id, data: [], deck: [], current: null };
            
            // Salva lista cloni
            const clones = JSON.parse(localStorage.getItem('active_clones') || "[]");
            clones.push(id);
            localStorage.setItem('active_clones', JSON.stringify(clones));
            
            addCloneToNav(id);
            location.reload(); // Ricarica per generare l'interfaccia
        }

        function addCloneToNav(id) {
            const nav = document.getElementById('mainNav');
            const btn = document.createElement('button');
            btn.className = 'nav-btn';
            btn.innerText = 'Clone ' + id.slice(-4);
            btn.onclick = () => switchTab(id);
            nav.appendChild(btn);
        }

        function switchTab(t) {
            document.querySelectorAll('.db-section').forEach(s => s.classList.remove('active'));
            const section = document.getElementById('section' + t);
            if(section) section.classList.add('active');
            renderTable(t);
        }

        function renderTable(t) {
            const table = document.getElementById('table' + t);
            if(!table) return;
            let html = `<tr><th>Elemento</th><th>Traduzione</th><th>Azioni</th></tr>`;
            dbs[t].data.forEach((w, i) => {
                html += `<tr>
                    <td>${w.en.toUpperCase()}</td>
                    <td><div class="hidden-text">${w.it.toUpperCase()}</div></td>
                    <td><button onclick="manualDelete('${t}', ${i})">🗑️</button></td>
                </tr>`;
            });
            table.innerHTML = html;
        }

        function save(t) { localStorage.setItem(dbs[t].key, JSON.stringify(dbs[t].data)); }
        function showToast(m) { const t=document.getElementById("toast"); t.innerText=m; t.className="show"; setTimeout(()=>t.className="", 3000); }
        function updateInfo(t) { const info = document.getElementById('info' + t); if(info) info.innerText = "RESTANTI: " + dbs[t].deck.length; }

        window.onload = init;
    </script>
</body>
</html>
