<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flashcards Pro - V51.9.9 (Full Version)</title>
    <style>
        :root { --blue: #007bff; --purple: #6f42c1; --dark-blue: #2c3e50; --bg: #f4f7f9; --text-dark: #2d3436; --deep-blue: #0984e3; --light-gray: #f1f2f6; --red: #e74c3c; --green: #27ae60; --orange: #f39c12; --teal: #00cec9; --grey: #636e72; --pink: #d63031; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; padding-bottom: 80px; color: var(--text-dark); overflow-x: hidden; width: 100vw; }
        button, .nav-btn, .list-btn { transition: transform 0.1s ease, opacity 0.1s ease; outline: none; cursor: pointer; border: none; }
        button:active, .nav-btn:active, .list-btn:active { transform: scale(0.92); opacity: 0.7; }
        .main-nav { background: #2c3e50; width: 100%; display: flex; justify-content: center; padding: 12px 0; gap: 15px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.2); flex-wrap: wrap; }
        .nav-btn { padding: 10px 20px; border-radius: 6px; font-weight: bold; color: white; background: #455a64; font-size: 14px; }
        .nav-btn.active-a { background: var(--blue); }
        .nav-btn.active-d { background: var(--pink); }
        .nav-btn.active-b { background: var(--purple); }
        .nav-btn.active-c { background: var(--dark-blue); border: 1px solid white; }
        
        .card { background: white; width: 100%; max-width: 1000px; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; margin-bottom: 25px; border-top: 8px solid #ddd; box-sizing: border-box; }
        #sectionA .card { border-color: var(--blue); }
        #sectionD .card { border-color: var(--pink); }
        #sectionB .card { border-color: var(--purple); }
        #sectionC .card { border-color: var(--dark-blue); }
        
        .word-display { font-size: 34px; font-weight: 800; margin: 25px auto; display: flex; align-items: center; justify-content: flex-start; gap: 15px; min-height: 60px; color: #1a1a1a; word-break: break-word; width: 85%; max-width: 850px; text-align: left; }
        .input-group { display: flex; width: 85%; max-width: 850px; margin: 0 auto 10px auto; gap: 10px; }
        .game-input { flex: 1; padding: 18px; border: 2px solid #b2bec3; border-radius: 10px; font-size: 22px; text-align: center; outline: none; box-sizing: border-box; }
        .btn-check { width: 180px; padding: 0 15px; border-radius: 10px; font-weight: bold; color: white; background: #2d3436; font-size: 16px; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .feedback-area { margin: 0 auto 20px auto; width: 85%; max-width: 850px; font-weight: 900; font-size: 26px; min-height: 45px; color: var(--deep-blue); line-height: 1.4; white-space: pre-line; text-align: left; }
        
        .game-controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 85%; max-width: 850px; margin: 0 auto; }
        .btn-act { padding: 14px; border-radius: 8px; color: white; font-weight: bold; font-size: 14px; text-transform: uppercase; }
        .btn-edit { background: #636e72; }
        .btn-postpone { background: var(--orange); }
        .btn-delete { background: var(--red); }
        
        .db-section { display: none; width: 100%; flex-direction: column; align-items: center; padding: 20px 0; }
        .db-section.active { display: flex; }
        
        .add-container { width: 100%; max-width: 1200px; background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; gap: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #eee; box-sizing: border-box;}
        .add-input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        .btn-add { background: var(--green); color: white; padding: 10px 20px; border-radius: 6px; font-weight: bold; font-size: 14px; }
        
        .search-container { width: 100%; max-width: 1200px; margin-bottom: 15px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; box-sizing: border-box; padding: 0 5px; }
        .search-input { width: 250px; flex-grow: 1; padding: 12px 15px; border-radius: 10px; border: 1px solid #dfe6e9; font-size: 16px; outline: none; box-sizing: border-box; }
        .btn-tool { padding: 10px 15px; border-radius: 8px; color: white; font-weight: bold; font-size: 12px; text-transform: uppercase; }
        
        .admin-panel { background: white; width: 100%; max-width: 1200px; border-radius: 15px; border: 1px solid #dfe6e9; margin-bottom: 30px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); box-sizing: border-box; }
        .scroll-area { max-height: 800px; overflow-y: auto; overflow-x: auto; }
        table { width: 100%; min-width: 1000px; border-collapse: collapse; }
        th { background: #2d3436; padding: 15px 5px; font-size: 11px; color: white; text-transform: uppercase; text-align: center; position: sticky; top: 0; z-index: 10; }
        td { padding: 12px 4px; border-bottom: 1px solid #eee; text-align: center; font-size: 14px; }
        .hidden-text { background: var(--light-gray); color: var(--deep-blue); padding: 8px 12px; border-radius: 6px; cursor: pointer; display: block; filter: blur(4px); transition: filter 0.2s; }
        tr:hover .hidden-text { filter: blur(0); }
        
        .backup-footer { width: 100%; max-width: 1200px; display: flex; justify-content: center; gap: 15px; margin-top: 20px; padding: 20px; border-top: 2px dashed #ccc; box-sizing: border-box; flex-wrap: wrap; }
        .btn-backup { padding: 15px 20px; border-radius: 10px; color: white; font-weight: bold; font-size: 13px; cursor: pointer; flex: 1; min-width: 200px; text-transform: uppercase; }
        .btn-export { background: #2d3436; }
        .btn-merge { background: #27ae60; }
        .btn-overwrite { background: #c0392b; }
        
        #toast { visibility: hidden; min-width: 250px; background-color: #333; color: #fff; text-align: center; border-radius: 8px; padding: 16px; position: fixed; z-index: 4000; left: 50%; bottom: 30px; transform: translateX(-50%); font-weight: bold; }
        #toast.show { visibility: visible; }
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 3000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 800px; }
    </style>
</head>
<body>

    <div id="toast">Operazione completata!</div>

    <div id="editModal" class="modal-overlay">
        <div class="modal-content">
            <h3>Modifica Elemento</h3>
            <div id="fieldsGeneral">
                <div style="margin-bottom:10px"><label>Inglese / Base:</label><textarea id="editEn" style="width:100%; padding:10px"></textarea></div>
                <div style="margin-bottom:10px"><label>Italiano / Traduzione:</label><textarea id="editIt" style="width:100%; padding:10px"></textarea></div>
                <div id="fieldVerb" style="display:none; margin-bottom:10px"><label>Paradigma:</label><textarea id="editFull" style="width:100%; padding:10px"></textarea></div>
            </div>
            <div style="display:flex; gap:10px; margin-top:20px">
                <button onclick="saveModal()" style="background:var(--green); color:white; padding:12px 25px; border-radius:8px">Salva</button>
                <button onclick="closeModal()" style="background:var(--grey); color:white; padding:12px 25px; border-radius:8px">Annulla</button>
            </div>
        </div>
    </div>

    <nav class="main-nav">
        <button id="navA" class="nav-btn active-a" onclick="switchTab('A')">Database 1</button>
        <button id="navD" class="nav-btn" onclick="switchTab('D')">Database 2</button>
        <button id="navB" class="nav-btn" onclick="switchTab('B')">Lesson and Grammar</button>
        <button id="navC" class="nav-btn" onclick="switchTab('C')">Verbi Irregolari</button>
    </nav>

    <section id="sectionA" class="db-section active">
        <div class="card">
            <div id="infoA" style="font-weight:bold; margin-bottom:10px; color:var(--blue)"></div>
            <div class="word-display"><span id="displayA">...</span><button onclick="speakItem(dbs.A.current.en)" style="background:none; font-size:30px;">🔊</button></div>
            <div id="gameA">
                <div class="input-group">
                    <input type="text" id="ansA" class="game-input" placeholder="Traduci..." autocomplete="off" onkeydown="if(event.key==='Enter') checkGeneric('A')">
                    <button id="checkA" class="btn-check" onclick="checkGeneric('A')">CONTROLLA</button>
                </div>
                <div id="fbA" class="feedback-area"></div>
                <div class="game-controls">
                    <button class="btn-act btn-edit" onclick="manualEdit('A')">Modifica</button>
                    <button class="btn-act btn-postpone" onclick="togglePause('A')">Posticipa</button>
                    <button class="btn-act btn-delete" onclick="manualDelete('A')">Elimina</button>
                </div>
            </div>
            <button id="restartA" style="display:none; padding:15px; background:var(--green); color:white; border-radius:10px; font-weight:bold" onclick="restartSession('A')">RICOMINCIA SESSIONE 🔄</button>
        </div>
        <div class="add-container">
            <input type="text" id="newEnA" class="add-input" placeholder="Inglese" onkeydown="handlePcTranslate(event, 'A', 'en')">
            <input type="text" id="newItA" class="add-input" placeholder="Italiano" onkeydown="handlePcTranslate(event, 'A', 'it')">
            <button class="btn-add" onclick="smartAdd('A')">AGGIUNGI +</button>
        </div>
        <div class="search-container">
            <input type="text" id="searchA" class="search-input" placeholder="Cerca..." oninput="renderTable('A')">
            <button class="btn-tool" style="background:var(--grey)" onclick="refreshList('A')">🔄 AGGIORNA</button>
        </div>
        <div class="admin-panel"><div class="scroll-area"><table id="tableA"></table></div></div>
    </section>

    <section id="sectionD" class="db-section">
        <div class="card">
            <div id="infoD" style="font-weight:bold; margin-bottom:10px; color:var(--pink)"></div>
            <div class="word-display"><span id="displayD">...</span><button onclick="speakItem(dbs.D.current.en)" style="background:none; font-size:30px;">🔊</button></div>
            <div id="gameD">
                <div class="input-group">
                    <input type="text" id="ansD" class="game-input" placeholder="Traduci..." autocomplete="off" onkeydown="if(event.key==='Enter') checkGeneric('D')">
                    <button id="checkD" class="btn-check" style="background:var(--pink)" onclick="checkGeneric('D')">CONTROLLA</button>
                </div>
                <div id="fbD" class="feedback-area"></div>
                <div class="game-controls">
                    <button class="btn-act btn-edit" onclick="manualEdit('D')">Modifica</button>
                    <button class="btn-act btn-postpone" onclick="togglePause('D')">Posticipa</button>
                    <button class="btn-act btn-delete" onclick="manualDelete('D')">Elimina</button>
                </div>
            </div>
            <button id="restartD" style="display:none; padding:15px; background:var(--green); color:white; border-radius:10px" onclick="restartSession('D')">RICOMINCIA 🔄</button>
        </div>
        <div class="add-container">
            <input type="text" id="newEnD" class="add-input" placeholder="Inglese" onkeydown="handlePcTranslate(event, 'D', 'en')">
            <input type="text" id="newItD" class="add-input" placeholder="Italiano" onkeydown="handlePcTranslate(event, 'D', 'it')">
            <button class="btn-add" style="background:var(--pink)" onclick="smartAdd('D')">AGGIUNGI +</button>
        </div>
        <div class="search-container">
            <input type="text" id="searchD" class="search-input" placeholder="Cerca..." oninput="renderTable('D')">
            <button class="btn-tool" style="background:var(--grey)" onclick="refreshList('D')">🔄 AGGIORNA</button>
        </div>
        <div class="admin-panel"><div class="scroll-area"><table id="tableD"></table></div></div>
    </section>

    <section id="sectionB" class="db-section">
        <div class="card">
            <div id="infoB" style="font-weight:bold; margin-bottom:10px; color:var(--purple)"></div>
            <div class="word-display"><span id="displayB">...</span><button onclick="speakItem(dbs.B.current.en)" style="background:none; font-size:30px;">🔊</button></div>
            <div id="gameB">
                <div class="input-group">
                    <input type="text" id="ansB" class="game-input" placeholder="Traduci..." autocomplete="off" onkeydown="if(event.key==='Enter') checkGeneric('B')">
                    <button id="checkB" class="btn-check" style="background:var(--purple)" onclick="checkGeneric('B')">CONTROLLA</button>
                </div>
                <div id="fbB" class="feedback-area"></div>
                <div class="game-controls">
                    <button class="btn-act btn-edit" onclick="manualEdit('B')">Modifica</button>
                    <button class="btn-act btn-postpone" onclick="togglePause('B')">Posticipa</button>
                    <button class="btn-act btn-delete" onclick="manualDelete('B')">Elimina</button>
                </div>
            </div>
            <button id="restartB" style="display:none; padding:15px; background:var(--green); color:white; border-radius:10px" onclick="restartSession('B')">RICOMINCIA 🔄</button>
        </div>
        <div class="add-container">
            <input type="text" id="newEnB" class="add-input" placeholder="Testo Inglese" onkeydown="handlePcTranslate(event, 'B', 'en')">
            <input type="text" id="newItB" class="add-input" placeholder="Traduzione Italiana" onkeydown="handlePcTranslate(event, 'B', 'it')">
            <button class="btn-add" style="background:var(--purple)" onclick="smartAdd('B')">AGGIUNGI +</button>
        </div>
        <div class="search-container">
            <input type="text" id="searchB" class="search-input" placeholder="Cerca..." oninput="renderTable('B')">
            <button class="btn-tool" style="background:var(--grey)" onclick="refreshList('B')">🔄 AGGIORNA</button>
        </div>
        <div class="admin-panel"><div class="scroll-area"><table id="tableB"></table></div></div>
    </section>

    <section id="sectionC" class="db-section">
        <div class="card">
            <div id="infoC" style="font-weight:bold; margin-bottom:10px; color:var(--dark-blue)"></div>
            <div class="word-display"><span id="displayC">...</span><button id="speakBtnC" onclick="speakItem(dbs.C.current.full)" style="background:none; font-size:30px;">🔊</button></div>
            <div id="gameC">
                <div class="input-group">
                    <input type="text" id="ansC" class="game-input" placeholder="Paradigma..." autocomplete="off" onkeydown="if(event.key==='Enter') checkGeneric('C')">
                    <button id="checkC" class="btn-check" style="background:var(--dark-blue)" onclick="checkGeneric('C')">CONTROLLA</button>
                </div>
                <div id="fbC" class="feedback-area"></div>
                <div class="game-controls">
                    <button class="btn-act btn-edit" onclick="manualEdit('C')">Modifica</button>
                    <button class="btn-act btn-postpone" onclick="togglePause('C')">Posticipa</button>
                    <button class="btn-act btn-delete" onclick="manualDelete('C')">Elimina</button>
                </div>
            </div>
            <button id="restartC" style="display:none; padding:15px; background:var(--green); color:white; border-radius:10px" onclick="restartSession('C')">RICOMINCIA 🔄</button>
        </div>
        <div class="add-container">
            <input type="text" id="newBaseC" class="add-input" placeholder="Base (es: Go)">
            <input type="text" id="newFullC" class="add-input" placeholder="Paradigma (es: Go Went Gone)">
            <input type="text" id="newItC" class="add-input" placeholder="Traduzione (es: Andare)">
            <button class="btn-add" style="background:var(--dark-blue)" onclick="addNewVerb()">AGGIUNGI +</button>
        </div>
        <div class="search-container">
            <input type="text" id="searchC" class="search-input" placeholder="Cerca..." oninput="renderTable('C')">
            <button class="btn-tool" style="background:var(--grey)" onclick="refreshList('C')">🔄 AGGIORNA</button>
        </div>
        <div class="admin-panel"><div class="scroll-area"><table id="tableC"></table></div></div>
    </section>

    <div class="backup-footer">
        <button class="btn-backup btn-export" onclick="exportData()">💾 ESPORTA BACKUP</button>
        <button class="btn-backup btn-merge" onclick="triggerImport('merge')">📥 UNISCI (Dati nuovi)</button>
        <button class="btn-backup btn-overwrite" onclick="triggerImport('overwrite')">⚠️ SOVRASCRIVI (Copia esatta)</button>
        <input type="file" id="importFile" style="display:none" onchange="handleImport(event)">
    </div>

<script>
    const APP_PREFIX = 'GITHUB_PROJECT_V51';
    let dbs = {
        A: { key: APP_PREFIX + '_DB_A', data: [], deck: [], current: null },
        D: { key: APP_PREFIX + '_DB_D', data: [], deck: [], current: null },
        B: { key: APP_PREFIX + '_DB_B', data: [], deck: [], current: null },
        C: { key: APP_PREFIX + '_DB_C', data: [], deck: [], current: null }
    };
    let currentEditIdx = null;
    let currentEditTab = null;
    let importMode = 'merge';

    function init() {
        ['A', 'D', 'B', 'C'].forEach(t => {
            let saved = localStorage.getItem(dbs[t].key);
            dbs[t].data = saved ? JSON.parse(saved) : [];
            buildDeck(t);
            t === 'C' ? nextVerb() : nextCard(t);
            renderTable(t);
        });
    }

    function buildDeck(t) {
        dbs[t].deck = dbs[t].data.filter(w => !w.nextReview || Date.now() > w.nextReview).sort(() => Math.random() - 0.5);
    }

    // --- LOGICA GIOCO ---
    function nextCard(t, keepCurrent = false) {
        const btn = document.getElementById('check' + t);
        if (!keepCurrent) dbs[t].current = dbs[t].deck.pop();
        
        if (!dbs[t].current) {
            document.getElementById('display' + t).innerText = "FINITO! ✅";
            document.getElementById('game' + t).style.display = "none";
            document.getElementById('restart' + t).style.display = "block";
            return;
        }
        
        document.getElementById('game' + t).style.display = "block";
        document.getElementById('restart' + t).style.display = "none";
        
        // Rotazione semplice o fissa (puoi integrare la tua logica alt qui)
        document.getElementById('display' + t).innerText = dbs[t].current.en;
        dbs[t].current._target = dbs[t].current.it;

        if (!keepCurrent) {
            document.getElementById('ans' + t).value = "";
            document.getElementById('fb' + t).innerText = "";
            btn.innerText = "CONTROLLA";
        }
        document.getElementById('info' + t).innerText = `RIMANENTI: ${dbs[t].deck.length + 1}`;
        document.getElementById('ans' + t).focus();
    }

    function nextVerb(keepCurrent = false) {
        const t = 'C';
        const btn = document.getElementById('checkC');
        if (!keepCurrent) dbs[t].current = dbs[t].deck.pop();
        
        if (!dbs[t].current) {
            document.getElementById('displayC').innerText = "FINITO! ✅";
            document.getElementById('gameC').style.display = "none";
            document.getElementById('restartC').style.display = "block";
            return;
        }
        
        document.getElementById('gameC').style.display = "block";
        document.getElementById('restartC').style.display = "none";
        document.getElementById('displayC').innerText = dbs[t].current.it; // Mostra traduzione per chiedere paradigma
        
        if (!keepCurrent) {
            document.getElementById('ansC').value = "";
            document.getElementById('fbC').innerText = "";
            btn.innerText = "CONTROLLA";
        }
        document.getElementById('infoC').innerText = `RIMANENTI: ${dbs[t].deck.length + 1}`;
        document.getElementById('ansC').focus();
    }

    function checkGeneric(t) {
        const btn = document.getElementById('check' + t);
        if (btn.innerText === "PROSSIMO") {
            t === 'C' ? nextVerb() : nextCard(t);
            return;
        }
        const target = t === 'C' ? dbs[t].current.full : dbs[t].current._target;
        document.getElementById('fb' + t).innerText = target.toUpperCase();
        btn.innerText = "PROSSIMO";
    }

    function restartSession(t) {
        buildDeck(t);
        t === 'C' ? nextVerb() : nextCard(t);
        showToast("Sessione riavviata");
    }

    // --- AGGIUNTA E TRADUZIONE ---
    async function translateText(text, sl, tl) {
        try {
            const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sl}&tl=${tl}&dt=t&q=${encodeURIComponent(text)}`);
            const json = await res.json();
            return json[0][0][0];
        } catch (e) { return ""; }
    }

    async function handlePcTranslate(e, t, lang) {
        if (e.key === 'Enter') {
            const enField = document.getElementById('newEn' + t);
            const itField = document.getElementById('newIt' + t);
            if (enField.value && !itField.value) {
                itField.placeholder = "Traduco...";
                itField.value = await translateText(enField.value, 'en', 'it');
            } else if (itField.value && !enField.value) {
                enField.placeholder = "Traduco...";
                enField.value = await translateText(itField.value, 'it', 'en');
            } else if (enField.value && itField.value) {
                smartAdd(t);
            }
        }
    }

    function smartAdd(t) {
        const en = document.getElementById('newEn' + t).value.trim();
        const it = document.getElementById('newIt' + t).value.trim();
        if (!en || !it) return;
        dbs[t].data.push({ en, it, nextReview: 0 });
        save(t); buildDeck(t); renderTable(t);
        document.getElementById('newEn' + t).value = "";
        document.getElementById('newIt' + t).value = "";
        showToast("Aggiunto!");
    }

    function addNewVerb() {
        const base = document.getElementById('newBaseC').value.trim();
        const full = document.getElementById('newFullC').value.trim();
        const it = document.getElementById('newItC').value.trim();
        if (!base || !full || !it) return;
        dbs.C.data.push({ base, full, it, en: base, nextReview: 0 });
        save('C'); buildDeck('C'); renderTable('C');
        document.getElementById('newBaseC').value = "";
        document.getElementById('newFullC').value = "";
        document.getElementById('newItC').value = "";
        showToast("Verbo aggiunto!");
    }

    // --- GESTIONE LISTE ---
    function renderTable(t) {
        const table = document.getElementById('table' + t);
        const query = document.getElementById('search' + t).value.toLowerCase();
        table.innerHTML = `<tr><th>Parola / Base</th><th>Traduzione / Paradigma</th><th>Azioni</th></tr>`;
        
        dbs[t].data.forEach((w, idx) => {
            const main = t === 'C' ? w.base : w.en;
            const trans = t === 'C' ? w.full : w.it;
            if (main.toLowerCase().includes(query) || (t === 'C' ? w.it : w.it).toLowerCase().includes(query)) {
                const row = table.insertRow();
                row.innerHTML = `
                    <td style="font-weight:bold">${main}</td>
                    <td><span class="hidden-text">${trans}</span></td>
                    <td>
                        <button onclick="manualEdit('${t}', ${idx})" style="background:var(--grey); color:white; padding:5px; border-radius:4px">✏️</button>
                        <button onclick="manualDelete('${t}', ${idx})" style="background:var(--red); color:white; padding:5px; border-radius:4px">🗑️</button>
                    </td>
                `;
            }
        });
    }

    function refreshList(t) {
        // Pulisce i campi di input
        if(t === 'C') {
            document.getElementById('newBaseC').value = "";
            document.getElementById('newFullC').value = "";
            document.getElementById('newItC').value = "";
        } else {
            document.getElementById('newEn' + t).value = "";
            document.getElementById('newIt' + t).value = "";
        }
        // Pulisce la ricerca
        document.getElementById('search' + t).value = "";
        // Aggiorna tabella
        renderTable(t);
        showToast("Campi resettati e lista aggiornata");
    }

    // --- MODIFICA E ELIMINA ---
    function manualEdit(t, idx) {
        currentEditTab = t;
        currentEditIdx = idx === undefined ? dbs[t].data.indexOf(dbs[t].current) : idx;
        const item = dbs[t].data[currentEditIdx];
        
        document.getElementById('editEn').value = t === 'C' ? item.base : item.en;
        document.getElementById('editIt').value = t === 'C' ? item.it : item.it;
        if(t === 'C') {
            document.getElementById('fieldVerb').style.display = 'block';
            document.getElementById('editFull').value = item.full;
        } else {
            document.getElementById('fieldVerb').style.display = 'none';
        }
        document.getElementById('editModal').style.display = 'flex';
    }

    function saveModal() {
        const item = dbs[currentEditTab].data[currentEditIdx];
        if(currentEditTab === 'C') {
            item.base = document.getElementById('editEn').value.trim();
            item.full = document.getElementById('editFull').value.trim();
            item.it = document.getElementById('editIt').value.trim();
            item.en = item.base;
        } else {
            item.en = document.getElementById('editEn').value.trim();
            item.it = document.getElementById('editIt').value.trim();
        }
        save(currentEditTab);
        renderTable(currentEditTab);
        closeModal();
        showToast("Modificato!");
    }

    function closeModal() { document.getElementById('editModal').style.display = 'none'; }

    function manualDelete(t, idx) {
        if(!confirm("Eliminare definitivamente?")) return;
        const i = idx === undefined ? dbs[t].data.indexOf(dbs[t].current) : idx;
        dbs[t].data.splice(i, 1);
        save(t); buildDeck(t); renderTable(t);
        t === 'C' ? nextVerb() : nextCard(t);
    }

    function togglePause(t) {
        if(!dbs[t].current) return;
        dbs[t].current.nextReview = Date.now() + 2592000000; // 30 giorni
        save(t); buildDeck(t);
        t === 'C' ? nextVerb() : nextCard(t);
        showToast("Posticipato di 30gg");
    }

    // --- UTILS ---
    function save(t) { localStorage.setItem(dbs[t].key, JSON.stringify(dbs[t].data)); }
    
    function switchTab(t) {
        document.querySelectorAll('.db-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-a', 'active-d', 'active-b', 'active-c'));
        document.getElementById('section' + t).classList.add('active');
        document.getElementById('nav' + t).classList.add('active-' + t.toLowerCase());
        renderTable(t);
    }

    function speakItem(text) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'en-US';
        window.speechSynthesis.speak(msg);
    }

    function showToast(m) {
        const t = document.getElementById('toast');
        t.innerText = m; t.className = 'show';
        setTimeout(() => t.className = '', 3000);
    }

    // --- BACKUP ---
    function exportData() {
        const data = { A: dbs.A.data, D: dbs.D.data, B: dbs.B.data, C: dbs.C.data };
        const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `backup_flashcards_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
    }

    function triggerImport(mode) {
        importMode = mode;
        if(mode === 'overwrite' && !confirm("ATTENZIONE: Cancellerai tutti i dati correnti per sostituirli con il backup. Continuare?")) return;
        document.getElementById('importFile').click();
    }

    function handleImport(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (event) => {
            try {
                const imported = JSON.parse(event.target.result);
                ['A', 'D', 'B', 'C'].forEach(t => {
                    if(!imported[t]) return;
                    if(importMode === 'overwrite') {
                        dbs[t].data = imported[t];
                    } else {
                        // Merge basato sulla parola inglese/base per evitare duplicati
                        imported[t].forEach(newItem => {
                            const exists = dbs[t].data.some(old => (t === 'C' ? old.base : old.en) === (t === 'C' ? newItem.base : newItem.en));
                            if(!exists) dbs[t].data.push(newItem);
                        });
                    }
                    save(t);
                });
                location.reload();
            } catch(err) { alert("File non valido"); }
        };
        reader.readAsText(file);
    }

    window.onload = init;
</script>
</body>
</html>
